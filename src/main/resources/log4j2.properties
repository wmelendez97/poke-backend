status = WARN
property.logPath = ./logs
property.logFile = poke.log

# Console
appender.console.type = Console
appender.console.name = Console
appender.console.target = SYSTEM_OUT
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = [%d{yyyy-MM-dd HH:mm:ss}] [%-5level] [%X{txId}] %c{1} - %msg%n

# Daily RollingFile
appender.rolling.type = RollingFile
appender.rolling.name = RollingFile
appender.rolling.fileName = ${logPath}/${logFile}
appender.rolling.filePattern = ${logPath}/archived/${logFile}-%d{yyyy-MM-dd}.log.gz
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = [%d{yyyy-MM-dd HH:mm:ss}] [%-5level] [%X{txId}] %c{1} - %msg%n

# Rotation policy
appender.rolling.policies.type = Policies
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1
appender.rolling.policies.time.modulate = true

# Cleanup strategy (40 days)
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 40
appender.rolling.strategy.delete.type = Delete
appender.rolling.strategy.delete.basePath = ${logPath}/archived
appender.rolling.strategy.delete.maxDepth = 1
appender.rolling.strategy.delete.condition.type = IfFileName
appender.rolling.strategy.delete.condition.glob = poke-*.log.gz
appender.rolling.strategy.delete.condition2.type = IfLastModified
appender.rolling.strategy.delete.condition2.age = 40d

# Project logger
logger.poke.name = com.poke.api
logger.poke.level = info
logger.poke.additivity = false
logger.poke.appenderRef.console.ref = Console
logger.poke.appenderRef.rolling.ref = RollingFile

# Root logger
rootLogger.level = warn
rootLogger.appenderRef.console.ref = Console